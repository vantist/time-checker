name: Release Please

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Run Release Please
        uses: googleapis/release-please-action@v4
        with:
          # Use a Personal Access Token (classic) with repo scope stored as
          # RELEASE_PLEASE_TOKEN so Release Please can open/update PRs.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

  auto-merge-release-pr:
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.ref == 'release-please--branches--main'
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge for release PR
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
